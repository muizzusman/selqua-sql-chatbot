<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WhatTheSQL</title>
<link rel="stylesheet" href="style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1 id="logo">WhatTheSQL</h1>
    <div>
      <button id="dark-mode-toggle">🌙</button>
      <button id="new-chat">New Chat</button>
    </div>
  </header>

  <main id="chat-container">
    <div class="chat-message bot">What can I help with?</div>
  </main>

  <div class="input-container">
    <input
      type="text"
      id="user-input"
      placeholder="Ask Anything SQL Related"
    />
    <button id="send-btn">&#10148;</button>
  </div>

  <footer>
    <a href="https://instagram.com/your_page" target="_blank">
      Developed by Muizz and Daniyal
    </a>
  </footer>

<script src="script.js"></script>
</body>
</html>
